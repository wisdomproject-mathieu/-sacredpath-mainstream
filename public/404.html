<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sacred Path for Couples</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/^\/-sacredpath-mainstream/, "");
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace("/-sacredpath-mainstream/" + (path || "") + search + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
